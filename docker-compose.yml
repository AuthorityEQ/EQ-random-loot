# Docker Compose for Frostreaver Loot Buckets
#
# Usage:
#   docker-compose up -d        # Start in background
#   docker-compose logs -f      # Stream logs
#   docker-compose down         # Stop and remove containers
#
# By default, the app runs on http://localhost:3000
# For production, use a reverse proxy (nginx/caddy) for HTTPS

version: '3.8'

services:
  frostreaver:
    # Build from local Dockerfile
    # Or pull from registry: image: username/frostreaver:latest
    build:
      context: .
      dockerfile: Dockerfile

    # Container name for easy reference
    container_name: frostreaver-app

    # Port mappings: host:container
    # Expose on 3000 for reverse proxy to forward to
    ports:
      - "3000:3000"

    # Environment variables
    environment:
      # Next.js production mode
      NODE_ENV: production
      PORT: 3000

      # Optional: Add any app-specific env vars here
      # NEXT_PUBLIC_DOMAIN: https://frostreaver-loot.com

    # Restart policy for robustness
    # on-failure: restart max 5 times if exit code != 0
    # unless-stopped: always restart unless manually stopped
    restart: unless-stopped

    # Health check (runs inside container)
    # curl to the app to verify it's responding
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Resource limits (optional, customize per your infrastructure)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Volume mounts (if you need hot data reloading without rebuilds)
    # volumes:
    #   - ./data:/app/data:ro    # Mount data directory read-only
    #   - ./public:/app/public:ro  # Mount public assets read-only

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Override the default entrypoint if needed
    # entrypoint: ["dumb-init", "--"]
    # command: ["node_modules/.bin/next", "start"]

# Optional: Nginx reverse proxy for HTTPS and load balancing
# Uncomment to use; requires nginx.conf configuration
#
# services:
#   nginx:
#     image: nginx:alpine
#     ports:
#       - "80:80"
#       - "443:443"
#     volumes:
#       - ./nginx.conf:/etc/nginx/nginx.conf:ro
#       - ./certs:/etc/nginx/certs:ro
#     depends_on:
#       - frostreaver
#     restart: unless-stopped

# Optional: Watchtower for automatic image updates
# Uncomment to auto-pull and restart with latest image
#
# services:
#   watchtower:
#     image: containrrr/watchtower
#     volumes:
#       - /var/run/docker.sock:/var/run/docker.sock
#     command: frostreaver --interval 3600  # Check hourly
#     restart: unless-stopped

# Network (uses default bridge network)
# To expose the app:
#   - Locally: http://localhost:3000
#   - Via reverse proxy: https://your-domain.com (configure nginx/caddy)
networks:
  default:
    name: frostreaver-network
