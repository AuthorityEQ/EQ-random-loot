<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Loot Goblin banner</title>
  <desc id="desc">A dark fantasy banner with a coin pouch, scattered gold, a blue gem, and Loot Goblin title text.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="24%" cy="62%" r="48%">
      <stop offset="0%" stop-color="#5b3d18" stop-opacity=".62"/>
      <stop offset="42%" stop-color="#191510" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#060707" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0b8"/>
      <stop offset="24%" stop-color="#b98935"/>
      <stop offset="48%" stop-color="#f6d47a"/>
      <stop offset="74%" stop-color="#7a4d18"/>
      <stop offset="100%" stop-color="#f5db97"/>
    </linearGradient>
    <linearGradient id="dimGold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#d9ad5a"/>
      <stop offset="100%" stop-color="#5f3d18"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#dff7ff"/>
      <stop offset="42%" stop-color="#78bdd0"/>
      <stop offset="100%" stop-color="#28546c"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".64"/>
    </filter>
    <pattern id="grain" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M3 15h1M23 8h1M41 39h1M60 22h1M17 51h1M52 60h1" stroke="#fff" stroke-opacity=".055"/>
      <path d="M9 43h1M31 28h1M67 49h1M44 13h1M5 66h1" stroke="#000" stroke-opacity=".32"/>
    </pattern>
  </defs>
  <rect width="1400" height="520" fill="#070908"/>
  <rect width="1400" height="520" fill="url(#grain)" opacity=".58"/>
  <rect width="1400" height="520" fill="url(#bgGlow)"/>

  <g filter="url(#softShadow)" opacity=".96">
    <path d="M86 337c6-65 40-113 104-145 41-20 91-23 134-7 28 11 48 36 55 72 8 44-9 85-47 116-44 35-107 46-168 30-44-12-73-35-78-66Z" fill="#2b2017"/>
    <path d="M112 300c40-45 85-72 133-83 31-7 64-6 94 2-13-31-38-50-72-56-55-10-126 19-158 76-12 21-16 42-12 63Z" fill="#4a3320" opacity=".7"/>
    <path d="M117 311c38-36 74-55 112-57 42-3 77 15 112 51" fill="none" stroke="#916330" stroke-width="12" stroke-linecap="round" opacity=".74"/>
    <path d="M104 322c48-42 91-63 132-62 42 0 81 20 118 60" fill="none" stroke="#d7a85b" stroke-width="3" stroke-linecap="round" opacity=".65"/>
    <path d="M91 337c-32 6-54 23-67 50 43 8 82 1 119-21" fill="#3a281a"/>
  </g>

  <g filter="url(#softShadow)">
    <g transform="translate(151 337) rotate(-8)">
      <ellipse cx="0" cy="0" rx="43" ry="14" fill="url(#gold)"/>
      <ellipse cx="0" cy="-3" rx="34" ry="8" fill="#ffd875" opacity=".42"/>
    </g>
    <g transform="translate(222 362) rotate(7)">
      <ellipse cx="0" cy="0" rx="47" ry="15" fill="url(#gold)"/>
      <ellipse cx="0" cy="-3" rx="36" ry="8" fill="#ffe59a" opacity=".36"/>
    </g>
    <g transform="translate(101 392) rotate(10)">
      <ellipse cx="0" cy="0" rx="39" ry="13" fill="url(#dimGold)"/>
      <ellipse cx="0" cy="-3" rx="29" ry="7" fill="#f4c86a" opacity=".34"/>
    </g>
    <g transform="translate(283 391) rotate(-13)">
      <ellipse cx="0" cy="0" rx="42" ry="14" fill="url(#gold)"/>
      <ellipse cx="0" cy="-3" rx="31" ry="8" fill="#ffe08d" opacity=".38"/>
    </g>
    <g transform="translate(180 420) rotate(-2)">
      <ellipse cx="0" cy="0" rx="45" ry="14" fill="url(#dimGold)"/>
      <ellipse cx="0" cy="-3" rx="35" ry="8" fill="#efc466" opacity=".32"/>
    </g>
  </g>

  <g transform="translate(302 355) rotate(-18)" filter="url(#softShadow)">
    <path d="M0 38 29 0l54 8 31 45-43 35-52-10Z" fill="url(#gem)"/>
    <path d="M29 0 39 58 0 38M83 8 39 58l75-5M39 58l32 30" fill="none" stroke="#e9fbff" stroke-opacity=".58" stroke-width="3"/>
    <path d="M29 0 83 8 39 58Z" fill="#c6eff8" opacity=".28"/>
  </g>

  <g filter="url(#softShadow)">
    <text x="410" y="275" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="132" font-weight="600" letter-spacing="4">
      Loot Goblin
    </text>
    <text x="585" y="344" fill="#cbbfa4" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="22">
      EVERQUEST TOOLS
    </text>
    <path d="M452 331h126M1035 331h126" stroke="#b98935" stroke-width="2" opacity=".72"/>
    <path d="M576 331l16-8 16 8-16 8Z" fill="#b98935" opacity=".72"/>
    <path d="M1018 331l16-8 16 8-16 8Z" fill="#b98935" opacity=".72"/>
  </g>
  <rect width="1400" height="520" fill="url(#grain)" opacity=".32"/>
</svg>
