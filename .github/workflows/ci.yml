name: CI — Lint, Type-Check, Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'  # Cache npm dependencies for faster builds

      # Install dependencies
      - name: Install dependencies
        run: npm ci  # Use 'npm ci' instead of 'npm install' for CI environments

      # Run ESLint (Next.js lint)
      - name: Lint code
        run: npm run lint
        continue-on-error: false  # Fail if linting fails

      # Run TypeScript type-checker
      - name: Type-check TypeScript
        run: npx tsc --noEmit
        continue-on-error: false  # Fail if type-check fails

      # Build the Next.js app
      - name: Build app
        run: npm run build
        continue-on-error: false  # Fail if build fails

      # Optional: Run tests if they exist
      # - name: Run tests
      #   run: npm test

      # Optional: Build Docker image for preview
      # - name: Build Docker image
      #   run: docker build -t frostreaver:${{ github.sha }} .
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      # Optional: Push Docker image to registry
      # - name: Push to Docker registry
      #   uses: docker/build-push-action@v5
